name: CI/CD

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install black ruff

      - name: Check formatting with Black
        run: black --check app src gcp

      - name: Lint with Ruff
        run: ruff check app src gcp

      - name: Verify imports
        env:
          PYTHONPATH: src:.
        run: |
          python - <<'PY'
          import importlib

          modules = [
              "amex_default.config",
              "amex_default.features",
              "amex_default.features_spark",
              "gcp.spark.preprocess",
              "gcp.spark.build_features",
              "gcp.bigquery.load_features",
              "gcp.vertex.train",
              "gcp.vertex.register_model",
              "gcp.vertex.deploy_endpoint",
              "gcp.monitoring.drift_psi",
              "gcp.pipeline",
          ]

          for module in modules:
              importlib.import_module(module)

          print("Project imports successfully.")
          PY

  cd:
    name: CD
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Google Cloud project
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud config set project "${GCP_PROJECT_ID}"
          gcloud config set compute/region "${GCP_REGION}"

      - name: Configure Docker for Artifact Registry
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - name: Ensure Artifact Registry repository exists
        env:
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          gcloud artifacts repositories describe amex-ml \
            --location "${GCP_REGION}" \
          || gcloud artifacts repositories create amex-ml \
            --repository-format docker \
            --location "${GCP_REGION}" \
            --description "AMEX ML Docker images"

      - name: Build and push training image
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
        run: |
          IMAGE_URI="${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/amex-ml/amex-train:latest"
          docker build -f docker/Dockerfile.train -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      - name: Compile Vertex AI Pipeline
        env:
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          GCP_REGION: ${{ secrets.GCP_REGION }}
          VERTEX_PIPELINE_ROOT: ${{ secrets.VERTEX_PIPELINE_ROOT }}
          TRAINING_IMAGE_URI: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/amex-ml/amex-train:latest
        run: |
          python gcp/pipeline.py

      - name: Publish compiled pipeline template
        env:
          VERTEX_PIPELINE_ROOT: ${{ secrets.VERTEX_PIPELINE_ROOT }}
        run: |
          gcloud storage cp amex_pipeline.json ${VERTEX_PIPELINE_ROOT%/}/templates/amex_pipeline.json
