<svg width="900" viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }</style>
    <marker id="a" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Lane labels -->
  <text x="90" y="58" text-anchor="end" font-size="11" font-weight="600" fill="#0F6E56">Training</text>
  <text x="90" y="164" text-anchor="end" font-size="11" font-weight="600" fill="#993C1D">Inference</text>
  <text x="90" y="270" text-anchor="end" font-size="11" font-weight="600" fill="#BA7517">Streaming</text>

  <!-- ── TRAINING ROW ── -->

  <!-- GCS -->
  <rect x="100" y="30" width="110" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
  <text x="155" y="48" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#2C2C2A">GCS</text>
  <text x="155" y="68" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#5F5E5A">raw data</text>
  <line x1="210" y1="58" x2="222" y2="58" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>

  <!-- Dataproc -->
  <rect x="222" y="30" width="110" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="277" y="48" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">Dataproc</text>
  <text x="277" y="68" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041">Serverless</text>
  <line x1="332" y1="58" x2="344" y2="58" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>

  <!-- BigQuery -->
  <rect x="344" y="30" width="110" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="399" y="48" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#042C53">BigQuery</text>
  <text x="399" y="68" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0C447C">features</text>
  <line x1="454" y1="58" x2="466" y2="58" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>

  <!-- Vertex AI Pipeline -->
  <rect x="466" y="30" width="110" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="521" y="48" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">Vertex AI</text>
  <text x="521" y="68" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3C3489">Pipeline</text>
  <line x1="576" y1="58" x2="588" y2="58" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>

  <!-- Model Registry -->
  <rect x="588" y="30" width="110" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="643" y="48" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">Registry</text>
  <text x="643" y="68" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3C3489">model store</text>
  <line x1="698" y1="58" x2="710" y2="58" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>

  <!-- Endpoint -->
  <rect x="710" y="30" width="110" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="765" y="48" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">Endpoint</text>
  <text x="765" y="68" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#712B13">serving</text>

  <!-- ── INFERENCE ROW ── -->

  <!-- Cloud Function -->
  <rect x="100" y="136" width="110" height="56" rx="8" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="155" y="154" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#4A1B0C">Cloud</text>
  <text x="155" y="174" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#712B13">Function</text>
  <line x1="210" y1="164" x2="222" y2="164" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>

  <!-- Redis cache -->
  <rect x="222" y="136" width="110" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="277" y="154" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">Redis</text>
  <text x="277" y="174" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041">cache</text>
  <line x1="332" y1="164" x2="344" y2="164" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>

  <!-- BigQuery fallback -->
  <rect x="344" y="136" width="110" height="56" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text x="399" y="154" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#042C53">BigQuery</text>
  <text x="399" y="174" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#0C447C">fallback</text>
  <line x1="454" y1="164" x2="466" y2="164" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>

  <!-- Vertex AI Endpoint -->
  <rect x="466" y="136" width="110" height="56" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text x="521" y="154" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#26215C">Vertex AI</text>
  <text x="521" y="174" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#3C3489">Endpoint</text>

  <!-- ── STREAMING ROW ── -->

  <!-- Pub/Sub -->
  <rect x="100" y="242" width="110" height="56" rx="8" fill="#FAC775" stroke="#BA7517" stroke-width="0.5"/>
  <text x="155" y="260" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#412402">Pub/Sub</text>
  <text x="155" y="280" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#633806">cycle close</text>
  <line x1="210" y1="270" x2="222" y2="270" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>

  <!-- Dataflow -->
  <rect x="222" y="242" width="110" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="277" y="260" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">Dataflow</text>
  <text x="277" y="280" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041">streaming</text>
  <line x1="332" y1="270" x2="344" y2="270" stroke="#888780" stroke-width="1" marker-end="url(#a)"/>

  <!-- Redis refresh -->
  <rect x="344" y="242" width="110" height="56" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="399" y="260" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#04342C">Redis</text>
  <text x="399" y="280" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#085041">refresh</text>
</svg>
